<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaMatch | Inloggen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header-include"></div>
  <nav class="main-nav">
    <a href="home.html">Home</a>
    <a href="gallery.html">Galerij</a>
    <a href="upload.html">Upload</a>
    <a href="prijzen.html">Prijzen</a>
    <a href="privacy.html">Privacy</a>
    <a href="login.html" id="loginLink">Inloggen</a>
    <a href="register.html">Registreren</a>
  </nav>
  <main class="glass" style="max-width:400px;margin:2em auto 3em auto;padding:2.5em 2em 2em 2em;box-shadow:0 8px 40px #0008;border-radius:1.5em;">
    <h1 style="background:linear-gradient(90deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Inloggen</h1>
    <form id="loginForm">
      <label>Email: <input type="email" name="email" required></label><br>
      <label>Wachtwoord: <input type="password" name="password" required></label><br>
      <button type="submit">Inloggen</button>
    </form>
    <div id="loginStatus"></div>
  </main>
  <footer class="glass" style="margin-top:2em;">
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Galerij</a>
      <a href="upload.html">Upload</a>
      <a href="prijzen.html">Prijzen</a>
      <a href="privacy.html">Privacy</a>
      <a href="login.html">Inloggen</a>
      <a href="register.html">Registreren</a>
    </nav>
    <p>2025 MediaMatch - Alle rechten voorbehouden</p>
  </footer>
  <script>
  fetch('header.html').then(r=>r.text()).then(html=>{
    document.getElementById('header-include').innerHTML = html;
  });
  </script>
  <script src="config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
