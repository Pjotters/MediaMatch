<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Foto Uploaden</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="glass">
      <div class="logo"><img src="assets/MediaMatch.png" alt="MediaMatch Logo" height="40"></div>
      <nav>
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a>
          <a href="upload.html">Upload</a>
      </nav>
  </header>

  <main class="glass" style="max-width:600px; margin:auto; padding:2rem;">
    <h2>Upload een nieuwe foto</h2>
    <form id="uploadForm">
      <input type="file" name="photo" accept="image/*" required><br><br>
      <input type="text" name="title" placeholder="Titel van de foto" required><br><br>
      <input type="text" name="description" placeholder="Beschrijving"><br><br>
      <select name="category" required>
        <option value="">Selecteer categorie</option>
        <option value="natuur">Natuur</option>
        <option value="portret">Portret</option>
        <option value="architectuur">Architectuur</option>
        <option value="sport">Sport</option>
      </select><br><br>
      <button type="submit">Uploaden</button>
    </form>
    <p id="status"></p>
  </main>

  <footer class="glass">
      <p>© 2025 MediaMatch - Alle rechten voorbehouden</p>
  </footer>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const formData = new FormData(this);
        const status = document.getElementById('status');
        status.textContent = 'Uploaden...';

        try {
            const response = await fetch('https://constraints-greensboro-converted-jon.trycloudflare.com/app.py', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            if (response.ok) {
                status.textContent = 'Upload gelukt!';
                this.reset();
            } else {
                status.textContent = 'Fout: ' + (result.message || 'Onbekende fout');
            }
        } catch (err) {
            console.error(err);
            status.textContent = 'Netwerkfout';
        }
    });
  </script>
</body>
</html>
