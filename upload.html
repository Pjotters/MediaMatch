<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaMatch - Foto Uploaden</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Upload pagina specifieke styling */
    .upload-container {
      max-width: 600px;
      margin: 4rem auto;
      padding: 2.5rem;
      border-radius: var(--radius);
      background-color: hsla(var(--surface)/0.5);
      backdrop-filter: var(--blur);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid hsla(var(--primary)/0.2);
    }
    
    .form-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .form-header h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .form-header p {
      opacity: 0.8;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      opacity: 0.9;
    }
    
    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: calc(var(--radius) / 2);
      background-color: hsla(var(--surface)/0.5);
      border: 1px solid hsla(var(--primary)/0.3);
      color: white;
      backdrop-filter: var(--blur);
      transition: var(--transition);
      font-size: 1rem;
    }
    
    .form-control:focus {
      outline: none;
      border-color: hsla(var(--primary)/0.8);
      box-shadow: 0 0 0 3px hsla(var(--primary)/0.2);
    }
    
    .form-control::placeholder {
      color: hsla(var(--text)/0.6);
    }
    
    .file-upload {
      position: relative;
      display: block;
      width: 100%;
      padding: 0;
      margin-bottom: 1rem;
    }
    
    .file-upload-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 1.5rem;
      background-color: hsla(var(--surface)/0.3);
      border: 2px dashed hsla(var(--primary)/0.4);
      border-radius: calc(var(--radius) / 2);
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
    }
    
    .file-upload-label:hover {
      background-color: hsla(var(--surface)/0.5);
      border-color: hsla(var(--primary)/0.6);
    }
    
    .file-upload-input {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      font-size: 1px;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    
    .preview-container {
      margin-top: 1rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .image-preview {
      max-width: 100%;
      max-height: 300px;
      border-radius: calc(var(--radius) / 2);
      margin-bottom: 0.5rem;
    }
    
    .preview-title {
      font-size: 0.9rem;
      opacity: 0.8;
    }
    
    .btn-upload {
      display: block;
      width: 100%;
      padding: 0.8rem;
      margin-top: 1.5rem;
      background: linear-gradient(45deg, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      font-size: 1rem;
    }
    
    .btn-upload:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }
    
    .status-message {
      margin-top: 1.5rem;
      padding: 0.8rem 1rem;
      border-radius: calc(var(--radius) / 2);
      display: none;
      text-align: center;
    }
    
    .status-message.success {
      background-color: hsla(120, 60%, 50%, 0.1);
      border: 1px solid hsla(120, 60%, 50%, 0.3);
      color: hsl(120, 60%, 80%);
    }
    
    .status-message.error {
      background-color: hsla(0, 60%, 50%, 0.1);
      border: 1px solid hsla(0, 60%, 50%, 0.3);
      color: hsl(0, 60%, 80%);
    }
    
    .status-message.loading {
      background-color: hsla(200, 60%, 50%, 0.1);
      border: 1px solid hsla(200, 60%, 50%, 0.3);
      color: hsl(200, 60%, 80%);
    }
  </style>
  <script src="config.js"></script>
  <script src="upload.js" defer></script>
</head>
<body>
  <header class="glass">
      <div class="logo"><img src="assets/MediaMatch.png" alt="MediaMatch Logo" height="40"></div>
      <nav>
          <a href="index.html">Home</a>
          <a href="gallery.html">Galerij</a>
          <a href="upload.html" class="active">Upload</a>
          <a href="login.html">Login</a>
          <a href="pricing.html">Pricing</a>
          <a href="legal.html">Legal</a>
      </nav>
  </header>

  <main>
    <section class="upload-container glass">
      <div class="form-header">
        <h2>Deel je beelden</h2>
        <p>Upload je foto's en deel ze met de wereld</p>
      </div>
      
      <form id="uploadForm">
        <div class="form-group">
          <div class="file-upload">
            <label for="photo" class="file-upload-label">
              <span id="photoLabel">Sleep je foto hierheen of klik om te uploaden</span>
            </label>
            <input type="file" id="photo" name="photo" class="file-upload-input" accept="image/*" required>
          </div>
          
          <div id="previewContainer" class="preview-container">
            <img id="imagePreview" class="image-preview">
            <div id="previewTitle" class="preview-title"></div>
          </div>
        </div>
        
        <div class="form-group">
          <div class="file-upload">
            <label for="portrait_form" class="file-upload-label">
              <span id="portraitFormLabel">Portretrecht formulier (PDF of afbeelding)</span>
            </label>
            <input type="file" id="portrait_form" name="portrait_form" class="file-upload-input" accept=".pdf,image/*" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="title">Titel</label>
          <input type="text" id="title" name="title" class="form-control" placeholder="Geef je foto een pakkende titel" required>
        </div>
        
        <div class="form-group">
          <label for="description">Beschrijving</label>
          <textarea id="description" name="description" class="form-control" rows="3" placeholder="Vertel iets over je foto"></textarea>
        </div>
        
        <div class="form-group">
          <label for="category">Categorie</label>
          <select id="category" name="category" class="form-control" required>
            <option value="">Selecteer een categorie</option>
            <option value="natuur">Natuur</option>
            <option value="portret">Portret</option>
            <option value="architectuur">Architectuur</option>
            <option value="sport">Sport</option>
            <option value="evenement">Evenement</option>
            <option value="abstract">Abstract</option>
            <option value="overig">Overig</option>
          </select>
        </div>
        
        <button type="submit" class="btn-upload">Uploaden</button>
      </form>
      
      <div id="status" class="status-message"></div>
    </section>
  </main>

  <footer class="glass">
      <p>© 2025 MediaMatch - Alle rechten voorbehouden</p>
  </footer>
</body>
</html>
