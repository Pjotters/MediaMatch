<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaMatch - Foto Uploaden</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Upload pagina specifieke styling */
    .upload-container {
      max-width: 600px;
      margin: 4rem auto;
      padding: 2.5rem;
      border-radius: var(--radius);
      background-color: hsla(var(--surface)/0.5);
      backdrop-filter: var(--blur);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid hsla(var(--primary)/0.2);
    }
    
    .form-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .form-header h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .form-header p {
      opacity: 0.8;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      opacity: 0.9;
    }
    
    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: calc(var(--radius) / 2);
      background-color: hsla(var(--surface)/0.5);
      border: 1px solid hsla(var(--primary)/0.3);
      color: white;
      backdrop-filter: var(--blur);
      transition: var(--transition);
      font-size: 1rem;
    }
    
    .form-control:focus {
      outline: none;
      border-color: hsla(var(--primary)/0.8);
      box-shadow: 0 0 0 3px hsla(var(--primary)/0.2);
    }
    
    .form-control::placeholder {
      color: hsla(var(--text)/0.6);
    }
    
    .file-upload {
      position: relative;
      display: block;
      width: 100%;
      padding: 0;
      margin-bottom: 1rem;
    }
    
    .file-upload-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 1.5rem;
      background-color: hsla(var(--surface)/0.3);
      border: 2px dashed hsla(var(--primary)/0.4);
      border-radius: calc(var(--radius) / 2);
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
    }
    
    .file-upload-label:hover {
      background-color: hsla(var(--surface)/0.5);
      border-color: hsla(var(--primary)/0.6);
    }
    
    .file-upload-input {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      font-size: 1px;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    
    .preview-container {
      margin-top: 1rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .image-preview {
      max-width: 100%;
      max-height: 300px;
      border-radius: calc(var(--radius) / 2);
      margin-bottom: 0.5rem;
    }
    
    .preview-title {
      font-size: 0.9rem;
      opacity: 0.8;
    }
    
    .btn-upload {
      display: block;
      width: 100%;
      padding: 0.8rem;
      margin-top: 1.5rem;
      background: linear-gradient(45deg, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      font-size: 1rem;
    }
    
    .btn-upload:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }
    
    .status-message {
      margin-top: 1.5rem;
      padding: 0.8rem 1rem;
      border-radius: calc(var(--radius) / 2);
      display: none;
      text-align: center;
    }
    
    .status-message.success {
      background-color: hsla(120, 60%, 50%, 0.1);
      border: 1px solid hsla(120, 60%, 50%, 0.3);
      color: hsl(120, 60%, 80%);
    }
    
    .status-message.error {
      background-color: hsla(0, 60%, 50%, 0.1);
      border: 1px solid hsla(0, 60%, 50%, 0.3);
      color: hsl(0, 60%, 80%);
    }
    
    .status-message.loading {
      background-color: hsla(200, 60%, 50%, 0.1);
      border: 1px solid hsla(200, 60%, 50%, 0.3);
      color: hsl(200, 60%, 80%);
    }
    
    .theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background-color: transparent;
      border: none;
      padding: 0.5rem;
      cursor: pointer;
    }
    
    .theme-icon {
      width: 1.5rem;
      height: 1.5rem;
      background-color: hsla(var(--primary)/0.5);
      border-radius: 50%;
      transition: transform 0.3s;
    }
    
    .theme-toggle:hover .theme-icon {
      transform: rotate(180deg);
    }
  </style>
  <script src="config.js"></script>
  <script src="upload.js" defer></script>
  <script src="theme-toggle.js" defer></script>
</head>
<body>
  <header class="glass">
    <div class="logo"><img src="assets/MediaMatch.png" alt="MediaMatch Logo" height="40"></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Galerij</a>
      <a href="upload.html" class="active">Upload</a>
      <a href="login.html">Login</a>
      <a href="pricing.html">Pricing</a>
      <a href="legal.html">Legal</a>
    </nav>
    <button id="theme-toggle" class="theme-toggle" aria-label="Wissel kleurenschema" title="Wissel kleurenschema">
      <span class="theme-icon"></span>
    </button>
  </header>

  <main>
    <section class="upload-container glass">
      <div class="form-header">
        <h2>Foto uploaden</h2>
        <p>Upload je afbeelding, krijg automatisch een AI-titel & beschrijving, en bekijk direct een preview!</p>
      </div>
      <form id="uploadForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="photo" id="photoLabel">Foto(s) kiezen</label>
          <div class="file-upload">
            <label class="file-upload-label" for="photo">
              <span>Klik of sleep je afbeelding(en) hier</span>
              <input type="file" id="photo" name="photo" accept="image/*" multiple required class="form-control">
            </label>
          </div>
        </div>
        <div id="dynamic-titles"></div>
        <div class="form-group">
          <label for="portrait_form" id="portraitFormLabel">Optioneel: portretformulier</label>
          <input type="file" id="portrait_form" name="portrait_form" accept="application/pdf,image/*" class="form-control">
        </div>
        <div id="previewContainer" class="preview-container"></div>
        <div id="upload-limit-info" class="form-group"></div>
        <button type="submit" class="btn-glass">Uploaden</button>
        <div id="status" class="status-message"></div>
      </form>
    </section>
  </main>

  <footer class="glass">
    <p> 2025 MediaMatch - Alle rechten voorbehouden</p>
  </footer>
</body>
</html>
