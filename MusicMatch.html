<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>MusicMatch - Jouw Muziekwereld</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="config.js"></script>
  <script src="MusicMatch.js" defer></script>
</head>
<body class="dark-glass">
  <div class="musicmatch-main">
    <header>
      <h1>MusicMatch</h1>
    </header>
    <section class="musicmatch-sections">
      <div class="musicmatch-row">
        <h2>Recent beluisterd</h2>
        <div id="recent-listens" class="musicmatch-list"></div>
      </div>
      <div class="musicmatch-row">
        <h2>Recente Playlisten</h2>
        <div id="recent-playlists" class="musicmatch-list"></div>
      </div>
      <div class="musicmatch-row">
        <h2>Nieuwe Muziek</h2>
        <div id="new-music" class="musicmatch-list"></div>
      </div>
      <div class="musicmatch-row">
        <h2>Speciaal voor jou</h2>
        <div id="personal-recs" class="musicmatch-list"></div>
      </div>
    </section>
    <nav class="musicmatch-tabs">
      <button id="tab-home" class="active">Home</button>
      <button id="tab-search">Zoeken</button>
      <button id="tab-library">Bibliotheek</button>
      <button id="tab-dashboard">Dashboard</button>
    </nav>
    <section id="tab-content-home" class="tab-content"></section>
    <section id="tab-content-search" class="tab-content" style="display:none;">
      <h2>Muziek zoeken</h2>
      <input type="text" id="search-input" placeholder="Zoek op titel, artiest, genre...">
      <button id="search-btn">Zoek</button>
      <div id="search-results" class="musicmatch-list"></div>
    </section>
    <section id="tab-content-library" class="tab-content" style="display:none;">
      <h2>Jouw Bibliotheek</h2>
      <div id="library-list" class="musicmatch-list"></div>
    </section>
    <section id="tab-content-dashboard" class="tab-content" style="display:none;">
      <iframe src="p.c-dashboard.html" style="width:100%;height:600px;border:none;"></iframe>
    </section>
  </div>
</body>
</html>
