<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>MusicMatch - Jouw Muziekwereld</title>
  <link rel="stylesheet" href="spotify-theme.css">
  <script src="config.js"></script>
  <script src="MusicMatch.js" defer></script>
</head>
<body class="dark-glass">
  <div id="header-include"></div>
  <div class="musicmatch-main">
    <nav class="spotify-sidebar">
      <a href="MusicMatch.html" class="logo">MediaMatch</a>
      <a href="MusicMatch.html" class="nav-link active">Home</a>
      <a href="MediaMatch-search.html" class="nav-link">Zoeken</a>
      <a href="MediaMatch-library.html" class="nav-link">Bibliotheek</a>
      <a href="p.c-dashboard.html" class="nav-link">Dashboard</a>
    </nav>
    <main class="spotify-main">
      <section class="musicmatch-sections">
        <div class="musicmatch-row">
          <h2>Recent beluisterd</h2>
          <div id="recent-listens" class="musicmatch-list"></div>
        </div>
        <div class="musicmatch-row">
          <h2>Recente Playlisten</h2>
          <div id="recent-playlists" class="musicmatch-list"></div>
        </div>
        <div class="musicmatch-row">
          <h2>Nieuwe Muziek</h2>
          <div id="new-music" class="musicmatch-list"></div>
        </div>
        <div class="musicmatch-row">
          <h2>Speciaal voor jou</h2>
          <div id="personal-recs" class="musicmatch-list"></div>
        </div>
      </section>
    </main>
  </div>
  <script>
  fetch('header.html').then(r=>r.text()).then(html=>{
    document.getElementById('header-include').innerHTML = html;
  });
  </script>
</body>
</html>
