<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pjotters-Currenty Games</title>
  <link rel="stylesheet" href="pjotters-currenty.css">
</head>
<body>
  <header class="pjotters-header">
    <h1><span style="color:#ffd700;">Pjotters</span>-Currenty</h1>
    <nav>
      <a href="Pjotters-Currenty.html">Home</a>
      <a href="p.c-games.html" class="active">Games</a>
    </nav>
  </header>
  <main class="pjotters-main">
    <section class="pjotters-games">
      <h3>Speel & Verdien</h3>
      <div class="games-list">
        <button class="game-btn" onclick="startSlots()">Slots</button>
        <button class="game-btn" onclick="startRoulette()">Roulette</button>
        <button class="game-btn" onclick="startBlackjack()">Blackjack</button>
        <button class="game-btn" onclick="startMoneyClicker()">Money Clicker</button>
        <button class="game-btn" onclick="startQuiz()">Quiz</button>
        <button class="game-btn" onclick="startMemory()">Memory</button>
        <button class="game-btn" onclick="startReaction()">Reactiespel</button>
        <button class="game-btn" onclick="startGuess()">Raadspel</button>
        <button class="game-btn" onclick="startPuzzle()">Puzzel</button>
      </div>
      <div id="game-container"></div>
    </section>
    <section class="pjotters-leaderboard">
      <h3>Leaderboard</h3>
      <div id="leaderboard"></div>
    </section>
  </main>
  <footer class="pjotters-footer">
    <p>&copy; 2025 Pjotters-Currenty & MediaMatch</p>
  </footer>
  <script src="pjotters-games.js"></script>
</body>
</html>
