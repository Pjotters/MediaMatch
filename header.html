<style>
.main-header {backdrop-filter: blur(14px);}
.main-nav .dropdown {position:relative;}
.main-nav .dropbtn {
  background:linear-gradient(90deg,#b993f7,#f06292,#43e97b);
  color:#fff;font-weight:600;padding:0.7rem 1.4rem;border:none;border-radius:0.7rem;cursor:pointer;font-size:1.1rem;transition:background 0.2s;box-shadow:0 2px 10px #0002;}
.main-nav .dropbtn:hover {background:linear-gradient(90deg,#43e97b,#b993f7,#f06292);}
.main-nav .dropdown-content {
  display:none;position:absolute;top:110%;left:0;min-width:190px;background:rgba(34,20,46,0.98);box-shadow:0 8px 24px #0006;border-radius:0.8rem;padding:0.7rem 0;z-index:1010;}
.main-nav .dropdown-content a {
  color:#fff;display:block;padding:0.7rem 1.5rem;text-decoration:none;font-size:1rem;border-radius:0.5rem;transition:background 0.18s;}
.main-nav .dropdown-content a:hover {background:linear-gradient(90deg,#f06292,#43e97b,#b993f7);color:#222;}
.main-nav .dropdown:hover .dropdown-content {display:block;}
@media (max-width: 900px) {
  .main-header {flex-direction:column;gap:1.2rem;}
  .main-nav {flex-wrap:wrap;gap:1rem;}
}
</style>

<script>
// Fix dropdowns na dynamisch includen
(function(){
  document.querySelectorAll('.main-nav .dropdown').forEach(function(drop){
    var btn = drop.querySelector('.dropbtn');
    var content = drop.querySelector('.dropdown-content');
    btn.onclick = function(e){
      e.preventDefault();
      // Sluit andere dropdowns
      document.querySelectorAll('.main-nav .dropdown-content').forEach(function(dc){
        if(dc!==content) dc.style.display='none';
      });
      content.style.display = (content.style.display==='block') ? 'none' : 'block';
    };
  });
  // Sluit dropdowns bij klikken buiten menu
  document.addEventListener('click', function(e){
    if(!e.target.closest('.main-nav .dropdown')){
      document.querySelectorAll('.main-nav .dropdown-content').forEach(function(dc){dc.style.display='none';});
    }
  });
})();
</script>
