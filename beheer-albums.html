<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albumbeheer - MediaMatch</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: linear-gradient(120deg, #18122B 0%, #3A235B 100%); color: #fff; }
    .beheer-container { max-width: 1100px; margin: 3rem auto; padding: 2.5rem; border-radius: 2rem; background: hsla(var(--surface)/0.72); box-shadow: 0 8px 32px rgba(0,0,0,0.18); backdrop-filter: blur(12px); }
    .beheer-header { font-size: 2rem; font-weight: 700; margin-bottom: 2.2rem; text-align: center; }
    .albums-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 2rem; }
    .album-card { background: #23203b; border-radius: 1.5rem; padding: 1.7rem 1.2rem 1.2rem; box-shadow: 0 4px 16px rgba(160,89,198,0.09); position: relative; display: flex; flex-direction: column; align-items: center; transition: transform 0.13s; }
    .album-card:hover { transform: translateY(-6px) scale(1.02); }
    .album-cover { width: 100%; max-width: 180px; height: 120px; object-fit: cover; border-radius: 1rem; border: 2px solid #a259c6; background: #19132a; margin-bottom: 1rem; }
    .album-title { font-size: 1.27rem; font-weight: 600; margin-bottom: 0.5rem; color: #a259c6; }
    .album-desc { font-size: 1rem; opacity: 0.85; margin-bottom: 0.7rem; text-align: center; }
    .album-meta { font-size: 0.93rem; color: #e1bee7; margin-bottom: 0.6rem; }
    .album-actions { display: flex; gap: 0.7rem; }
    .beheer-btn { padding: 0.6rem 1.3rem; border-radius: 1rem; border: none; background: linear-gradient(90deg,#a259c6,#f06292); color: #fff; font-size: 1rem; cursor: pointer; transition: background 0.18s; }
    .beheer-btn.delete { background: #f06292; }
    .beheer-btn.delete:hover { background: #c62828; }
    .beheer-btn:hover { background: linear-gradient(90deg,#f06292,#a259c6); }
    @media (max-width: 800px) { .albums-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="config.js"></script>
  <script src="beheer-albums.js" defer></script>
  <script src="theme-toggle.js" defer></script>
</head>
<body>
  <header class="glass">
    <div class="logo"><img src="assets/MediaMatch.png" alt="MediaMatch Logo" height="40"></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Galerij</a>
      <a href="search.html">Zoeken</a>
      <a href="upload-wizard.html">Upload</a>
      <a href="beheer-albums.html" class="active">Albumbeheer</a>
      <a href="pricing.html">Pricing</a>
      <a href="login.html">Login</a>
      <a href="legal.html">Legal</a>
    </nav>
    <button id="theme-toggle" class="theme-toggle" aria-label="Wissel kleurenschema" title="Wissel kleurenschema">
      <span class="theme-icon"></span>
    </button>
  </header>
  <main>
    <div class="beheer-container">
      <div class="beheer-header">Mijn Albums beheren</div>
      <div class="albums-grid" id="albumsGrid"></div>
    </div>
  </main>
  <footer class="glass">
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Galerij</a>
      <a href="search.html">Zoeken</a>
      <a href="upload-wizard.html">Upload</a>
      <a href="beheer-albums.html">Albumbeheer</a>
      <a href="pricing.html">Pricing</a>
      <a href="login.html">Login</a>
      <a href="legal.html">Legal</a>
    </nav>
    <p>2025 MediaMatch - Alle rechten voorbehouden</p>
  </footer>
</body>
</html>
