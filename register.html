<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaMatch - Registreren</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Register pagina specifieke styling */
        .register-container {
            max-width: 500px;
            margin: 2rem auto 4rem;
            padding: 2.5rem;
            border-radius: var(--radius);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            opacity: 0.9;
        }
        
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: calc(var(--radius) / 2);
            background-color: hsla(var(--surface)/0.5);
            border: 1px solid hsla(var(--primary)/0.3);
            color: white;
            backdrop-filter: var(--blur);
            transition: var(--transition);
        }
        
        .form-control:focus {
            outline: none;
            border-color: hsla(var(--primary)/0.8);
            box-shadow: 0 0 0 3px hsla(var(--primary)/0.2);
        }
        
        .btn-register {
            display: block;
            width: 100%;
            padding: 0.8rem;
            margin-top: 2rem;
            background: linear-gradient(45deg, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        }
        
        .password-requirements {
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .password-strength {
            height: 5px;
            background-color: hsla(var(--surface)/0.5);
            margin-top: 0.5rem;
            border-radius: 50px;
            overflow: hidden;
        }
        
        .password-strength-meter {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
        }
        
        .password-feedback {
            font-size: 0.85rem;
            margin-top: 0.25rem;
            min-height: 1.2em;
        }
        
        .form-toggle {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .form-toggle a {
            color: hsl(280, 80%, 70%);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .form-toggle a:hover {
            color: hsl(280, 80%, 80%);
            text-decoration: underline;
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .form-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-header p {
            opacity: 0.8;
        }
        
        .status-message {
            padding: 1rem;
            margin: 1rem 0;
            border-radius: calc(var(--radius) / 2);
            text-align: center;
            display: none;
        }
        
        .status-message.success {
            background-color: hsla(120, 60%, 50%, 0.1);
            border: 1px solid hsla(120, 60%, 50%, 0.3);
            color: hsl(120, 60%, 80%);
        }
        
        .status-message.error {
            background-color: hsla(0, 60%, 50%, 0.1);
            border: 1px solid hsla(0, 60%, 50%, 0.3);
            color: hsl(0, 60%, 80%);
        }
        
        #register-flow {
            max-width: 700px;
            margin: 3rem auto 2rem auto;
            padding: 2.5rem 2rem;
        }
        
        .role-choices {
            display: flex;
            gap: 1.5rem;
            margin: 1rem 0 1.5rem 0;
            justify-content: center;
        }
        
        .role-btn {
            padding: 0.8rem 1rem;
            border-radius: calc(var(--radius) / 2);
            background-color: hsla(var(--surface)/0.5);
            border: 1px solid hsla(var(--primary)/0.3);
            color: white;
            backdrop-filter: var(--blur);
            transition: var(--transition);
        }
        
        .role-btn:hover {
            background-color: hsla(var(--surface)/0.7);
        }
        
        #plan-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
    </style>
    <script src="config.js"></script>
    <script src="register-flow.js"></script>
</head>
<body>
    <div id="header-include"></div>
    <main>
        <section id="register-flow" class="glass" style="max-width:700px;margin:3rem auto 2rem auto;padding:2.5rem 2rem;">
            <h1>Maak je MediaMatch account</h1>
            <div id="register-step-form" style="display:block;margin-top:2.5rem;">
                <h2>Vul je gegevens in</h2>
                <form id="registerForm" autocomplete="off">
                    <div class="form-group">
                        <label for="name">Naam</label>
                        <input type="text" name="name" id="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mailadres</label>
                        <input type="email" name="email" id="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Wachtwoord</label>
                        <input type="password" name="password" id="password" class="form-control" required minlength="8">
                        <div id="password-strength" class="password-strength"></div>
                    </div>
                    <div class="form-group">
                        <label for="plan-select">Kies je abonnement</label>
                        <select id="plan-select" name="subscriptionType" class="form-control" required>
                            <option value="starter">Starter (Gratis)</option>
                            <option value="pro">Pro</option>
                            <option value="unlimited">Unlimited</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="role-select">Kies je rol</label>
                        <select id="role-select" name="role" class="form-control" required>
                            <option value="developer">Developer</option>
                            <option value="artiest">Artiest</option>
                            <option value="fotograaf">Fotograaf</option>
                            <option value="klant">Klant</option>
                        </select>
                    </div>
                    <button class="btn-register" type="submit">Registreer</button>
                    <div id="status" class="status-message" style="display:none;"></div>
                </form>
            </div>
        </section>
    </main>
    <script>
        fetch('header.html').then(r=>r.text()).then(html=>{
            document.getElementById('header-include').innerHTML = html;
        });
    </script>
</body>
</html>
