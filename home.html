<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welkom bij RoeiAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #e9f2fb;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #007bff;
      padding: 2rem;
      text-align: center;
      color: white;
    }
    main {
      max-width: 700px;
      margin: 4vh auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
    }
    a.button {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 1rem 2rem;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }
    a.button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welkom bij RoeiAI</h1>
    <p>Automatische gezichtsherkenning voor roeifoto's</p>
  </header>
  <main>
    <p>Upload jouw foto en wij zoeken automatisch andere foto's waarin jij voorkomt.</p>
    <a href="index.html" class="button">Ga naar uploadpagina</a>
  </main>
</body>
</html>
