<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaMatch - Fotogalerij</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Gallery specifieke styling */
        .gallery-header {
            text-align: center;
            padding: 4rem 2rem 2rem;
            margin-bottom: 2rem;
        }
        
        .gallery-filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 0.5rem 1.5rem;
            background: hsl(var(--surface)/0.6);
            border: 1px solid hsl(var(--primary)/0.3);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(45deg, hsl(var(--primary)/0.8), hsl(var(--secondary)/0.8));
            transform: translateY(-2px);
        }
        
        .gallery-grid {
            margin: 0 auto;
            max-width: 1400px;
            padding: 1rem;
        }
        
        .gallery-item {
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
            border-radius: calc(var(--radius) * 0.7);
        }
        
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        
        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: hsl(var(--surface)/0.8);
            backdrop-filter: var(--blur);
            padding: 1rem;
            transform: translateY(100%);
            transition: var(--transition);
            border-bottom-left-radius: calc(var(--radius) * 0.7);
            border-bottom-right-radius: calc(var(--radius) * 0.7);
        }
        
        .gallery-item:hover .overlay {
            transform: translateY(0);
        }
        
        .gallery-item .overlay h3 {
            margin: 0 0 0.5rem;
            font-size: 1.1rem;
        }
        
        .gallery-item .overlay p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        /* Masonry layout met verschillende hoogtes */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 10px;
            grid-gap: 1.5rem;
        }
        
        .gallery-item.tall {
            grid-row-end: span 50;
        }
        
        .gallery-item.medium {
            grid-row-end: span 40;
        }
        
        .gallery-item.small {
            grid-row-end: span 30;
        }
        
        /* Foutmelding styling */
        .error-container {
            grid-column: 1 / -1;
            padding: 3rem;
            text-align: center;
            background: hsl(var(--surface)/0.4);
            backdrop-filter: var(--blur);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid hsl(var(--primary)/0.2);
        }
        
        .error-message h3 {
            margin-bottom: 1rem;
            color: hsl(var(--primary));
        }
        
        .retry-btn {
            margin-top: 1.5rem;
            padding: 0.7rem 2rem;
            background: linear-gradient(45deg, hsl(var(--primary)/0.8), hsl(var(--secondary)/0.8));
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        /* Loading indicator styling */
        .loading-indicator {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
            background: hsl(var(--surface)/0.4);
            backdrop-filter: var(--blur);
            border-radius: var(--radius);
            border: 1px solid hsl(var(--primary)/0.2);
        }
        
        .loading-indicator p {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: hsl(var(--primary)/0.9);
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid hsla(var(--primary), 0.2);
            border-top-color: hsl(var(--primary));
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Verbeterde hover effecten */
        .gallery-item {
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            z-index: 5;
        }
        
        /* Responsieve aanpassingen */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
        
        /* Header en navigatie */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, hsl(var(--primary)), hsl(var(--secondary)));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text; /* Compatibiliteit */
        }
        
        nav {
            display: flex;
            gap: 1.5rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: var(--transition);
        }
        
        nav a:hover {
            opacity: 1;
            transform: translateY(-2px);
        }
    </style>
    <script src="gallery.js" defer></script>
</head>
<body>
    <header class="glass">
        <div class="logo"><img src="assets/MediaMatch.png" alt="MediaMatch Logo" height="40"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html" class="active">Galerij</a>
            <a href="upload.html">Upload</a>
            <a href="login.html">Login</a>
            <a href="pricing.html">Pricing</a>
            <a href="legal.html">Legal</a>
        </nav>
    </header>
    
    <main>
        <section class="gallery-header glass">
            <h1>Ontdek onze fotocollecties</h1>
            <p>Inspiratie voor jouw volgende shoot</p>
        </section>
        
        <section class="gallery-filters">
            <button class="filter-btn active" data-filter="all">Alle foto's</button>
            <button class="filter-btn" data-filter="natuur">Natuur</button>
            <button class="filter-btn" data-filter="portret">Portret</button>
            <button class="filter-btn" data-filter="architectuur">Architectuur</button>
            <button class="filter-btn" data-filter="sport">Sport</button>
        </section>
        
        <section class="gallery-grid">
            <!-- Dynamisch geladen via gallery.js -->
        </section>
    </main>
    
    <footer class="glass">
        <p>© 2025 MediaMatch - Alle rechten voorbehouden</p>
    </footer>
</body>
</html>
