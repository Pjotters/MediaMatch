<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Community | MusicMatch</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="config.js"></script>
  <script src="analytics.js"></script>
  <style>
    .community-hero { background: rgba(30,20,40,0.94); color: #f5d300; border-radius: 20px; margin: 2em auto 2em auto; padding: 2em 2em 1em 2em; max-width: 900px; box-shadow: 0 8px 40px #000b; }
    .community-form { background: rgba(40,30,60,0.97); border-radius: 18px; box-shadow: 0 4px 24px #000a; padding: 2em 1.5em; max-width: 400px; margin: 2em auto; color: #fff; }
    .community-form input, .community-form textarea { width: 100%; background: #181826; color: #fff; border: none; border-radius: 8px; margin-bottom: 1em; padding: 0.7em; }
    .community-form button { background: #a259c6; color: #fff; border: none; border-radius: 50px; padding: 0.7em 2em; font-size: 1em; cursor: pointer; transition: background 0.2s; }
    .community-form button:hover { background: #1db954; }
    .ideas-list { max-width: 900px; margin: 2em auto; }
    .idea-card { background: rgba(50,40,60,0.97); border-radius: 16px; box-shadow: 0 2px 16px #0007; color: #fff; margin-bottom: 1.5em; padding: 1.3em 1.2em 1em 1.2em; position:relative; }
    .idea-card .likes { color: #f5d300; font-weight: bold; margin-right: 1em; }
    .idea-card .like-btn { background: none; border: none; color: #a259c6; font-size: 1.2em; cursor: pointer; }
    .idea-card .like-btn.liked { color: #1db954; }
    .updates-tab { background: #23243d; color: #f5d300; border-radius: 10px; padding: 0.7em 1.2em; margin-bottom: 2em; font-size: 1.1em; box-shadow: 0 2px 10px #0006; max-width: 900px; margin: 2em auto 0 auto; }
  </style>
</head>
<body>
  <nav id="main-nav"></nav>
  <div class="community-hero">
    <h1>Community ideeën & updates</h1>
    <p>Dien jouw idee in, like ideeën van anderen en help MusicMatch samen nóg beter te maken!</p>
  </div>
  <div class="updates-tab" id="updatesTab">Laatste Update's: <span id="latestUpdates"></span></div>
  <form class="community-form" id="ideaForm">
    <input type="text" id="ideaTitle" placeholder="Titel van je idee" maxlength="80" required />
    <textarea id="ideaBody" placeholder="Beschrijf je idee..." maxlength="500" required></textarea>
    <button type="submit">Indienen</button>
  </form>
  <section class="ideas-list" id="ideasList"></section>
  <footer class="glass" style="margin-top:3em;text-align:center;">Project van de <b>Pjotters-Company</b></footer>
  <script src="community.js"></script>
</body>
</html>
