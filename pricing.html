<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaMatch - Prijsplannen</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Nieuwe eigen styling voor pricing */
        body { background: #181826; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
        .pricing-header { background: rgba(30,20,40,0.96); border-radius: 18px; margin: 2rem auto 2rem auto; box-shadow: 0 6px 32px #0008; }
        .role-selector { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; }
        .role-btn { background: linear-gradient(135deg, #a259c6, #1db954); color: #fff; border: none; border-radius: 18px; padding: 1.2rem 2.4rem; font-size: 1.3rem; font-weight: bold; box-shadow: 0 4px 24px #0006; cursor: pointer; transition: background 0.2s, transform 0.2s; }
        .role-btn.active, .role-btn:hover { background: linear-gradient(135deg, #1db954, #a259c6); transform: scale(1.07); }
        .pricing-tier-grid { display: flex; gap: 2.5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
        .pricing-card { background: rgba(30,20,40,0.98); border-radius: 18px; box-shadow: 0 6px 32px #0008; padding: 2rem 1.5rem; min-width: 210px; max-width: 270px; color: #fff; margin-bottom: 2rem; transition: transform 0.3s, box-shadow 0.3s; position: relative; border: 3px solid #a259c6; text-align: center; }
        .pricing-card h3 { margin-top: 0; font-size: 1.3rem; }
        .pricing-card .price { font-size: 1.4rem; color: #f5d300; margin: 1.1rem 0 0.7rem 0; }
        .pricing-card button { background: #a259c6; color: #fff; border: none; border-radius: 50px; padding: 0.7rem 2rem; font-size: 1.1rem; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
        .pricing-card button:hover { background: #1db954; }
        .pricing-compare { margin-top: 2.5rem; background: rgba(30,20,40,0.98); border-radius: 18px; box-shadow: 0 6px 32px #0008; }
        .pricing-table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
        .pricing-table th, .pricing-table td { padding: 1rem; border: 1px solid #a259c6; }
        .pricing-table th { background: #23243d; color: #f5d300; font-weight: bold; }
        .pricing-table td { background: #181826; color: #fff; }
        .pricing-table tr:nth-child(even) td { background: #23243d; }
        @media (max-width: 900px) { .pricing-tier-grid { flex-direction: column; align-items: center; } .pricing-card { min-width: 90vw; max-width: 98vw; } .pricing-table th, .pricing-table td { padding: 0.7rem; font-size: 0.98rem; } }
        
        /* Extra CSS voor tooltips, features, popup */
        .plan-features { list-style:none; margin:0.7em 0 0.5em 0; padding:0; font-size:0.98em; color:#fff; }
        .plan-features li { margin-bottom:0.2em; }
        .plan-tooltip { position:absolute; background:rgba(30,20,40,0.99); color:#f5d300; padding:0.9em 1.4em; border-radius:14px; box-shadow:0 6px 24px #000b; font-size:1em; z-index:10000; pointer-events:none; transition:opacity 0.2s; min-width:180px; max-width:260px; text-align:center; }
        .plan-popup-bg { position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:9998; }
        .plan-popup { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(30,20,40,0.99);color:#fff;padding:2.5em 2em;border-radius:18px;box-shadow:0 8px 36px #000c;z-index:9999;min-width:260px;max-width:90vw;text-align:center; }
        .plan-popup h2 { font-size:1.6em;margin-bottom:0.5em;color:#f5d300; }
        .plan-popup .price { font-size:1.2em;color:#a259c6;margin-bottom:0.7em; }
        .plan-popup ul { text-align:left; margin:1em auto 1.5em auto; display:inline-block; }
        .plan-popup button { background:#a259c6;color:#fff;border:none;border-radius:50px;padding:0.7rem 2rem;font-size:1.1rem;cursor:pointer;transition:background 0.2s; }
        .plan-popup button:hover { background:#1db954; }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <header class="glass">
        <div class="logo"><img src="assets/MediaMatch.png" alt="MediaMatch Logo" height="40"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="pricing.html">Prijzen</a>
            <a href="pricing-policy.html">Prijzenbeleid</a>
            <a href="legal.html">Juridisch</a>
        </nav>
    </header>
    
    <main>
      <section class="pricing-header glass animated-section">
        <h1>Kies je type gebruiker</h1>
        <div class="role-selector">
          <button class="role-btn" data-role="artiest">Artiest</button>
          <button class="role-btn" data-role="fotograaf">Fotograaf</button>
          <button class="role-btn" data-role="musicai">Music AI</button>
          <button class="role-btn" data-role="klant">Klant</button>
        </div>
      </section>
      <section id="pricing-tiers" class="animated-section"></section>
      <section id="pricing-comparisons" class="animated-section"></section>
    </main>
    
    <footer class="glass">
      <p> 2025 MediaMatch - Alle rechten voorbehouden</p>
    </footer>
    
    <script src="pricing.js"></script>
    <script src="pricing-klant.js"></script>
    <script>
      // --- Pricing Data ---
      const PRICING_GROUPS = {
        artiest: {
          label: 'Artiest',
          tiers: ['Basis','Pjotters-Currenty','Plus','Pro','Premium'],
          comparison: [
            ['Commerciële licentie', '30 dagen', '30 dagen (coins)', '90 dagen', '1 jaar', '2 jaar'],
            ['AI-muziek genereren', '✔️', '✔️', '✔️', '✔️', '✔️'],
            ['Aantal tracks per maand', '10', '10', '50', 'Onbeperkt', 'Onbeperkt'],
            ['Royaltyvrij', '✔️', '✔️', '✔️', '✔️', '✔️'],
            ['Support', 'Standaard', 'Standaard', 'Sneller (24u)', 'Premium (4u)', 'Premium (1u)'],
            ['Licentie verlengen', 'Elke 30 dagen', 'Elke 30 dagen', 'Elke 90 dagen', 'Jaarlijks', '2 jaar'],
          ]
        },
        fotograaf: {
          label: 'Fotograaf',
          tiers: ['Basis','Pjotters-Currenty','Plus','Pro','Premium'],
          comparison: [
            ['Foto uploads per maand', '50', '50', '250', 'Onbeperkt', 'Onbeperkt'],
            ['Watermerk verwijderen', '-', '-', '✔️', '✔️', '✔️'],
            ['Portfolio website', '-', '-', '✔️', '✔️', '✔️'],
            ['AI-zoekhulp', 'Basis', 'Basis', 'Uitgebreid', 'Volledig', 'Volledig'],
            ['Support', 'Standaard', 'Standaard', 'Sneller (24u)', 'Premium (4u)', 'Premium (1u)'],
            ['Privé-albums', '-', '-', '✔️', '✔️', '✔️'],
          ]
        },
        musicai: {
          label: 'Music AI',
          tiers: ['Basis','Pjotters-Currenty','Plus','Pro','Premium'],
          comparison: [
            ['Commerciële licentie', '30 dagen', '30 dagen (coins)', '90 dagen', '1 jaar', '2 jaar'],
            ['AI-muziek genereren', '✔️', '✔️', '✔️', '✔️', '✔️'],
            ['Tracks per maand', '10', '10', '50', 'Onbeperkt', 'Onbeperkt'],
            ['Lyrics generator', '-', '-', '✔️', '✔️', '✔️'],
            ['Instrumentaal & vocals', 'Instrumentaal', 'Instrumentaal', 'Instrumentaal', 'Beide', 'Beide'],
            ['Support', 'Standaard', 'Standaard', 'Sneller (24u)', 'Premium (4u)', 'Premium (1u)'],
          ]
        },
        klant: {
          label: 'Klant',
          tiers: ['Basis','Pjotters-Currenty','Plus','Pro','Premium'],
          comparison: [
            ['Chat met fotografen', '1 tegelijk', '1 tegelijk', '10 tegelijk', 'Onbeperkt', 'Onbeperkt'],
            ['Foto uploads per chat', '2', '2', '5', '20', '50'],
            ['Support', 'Standaard', 'Standaard', 'Sneller (24u)', 'Premium (4u)', 'Premium (1u)'],
            ['Downloadkwaliteit', 'Standaard', 'Standaard', 'Hoog', 'Origineel', 'Origineel'],
            ['AI-zoekhulp', 'Basis', 'Basis', 'Uitgebreid', 'Volledig', 'Volledig'],
            ['Moodboard maken', '✔️', '✔️', '✔️', '✔️', '✔️'],
            ['Favorieten opslaan', '-', '-', '✔️', '✔️', '✔️'],
            ['Notificaties/alerts', '-', '-', '✔️', '✔️', '✔️'],
            ['Privé-albums', '-', '-', '✔️', '✔️', '✔️'],
            ['AI-matching', '-', '-', '✔️', '✔️', '✔️'],
            ['Gedeelde chatrooms', '-', '-', '✔️', '✔️', '✔️'],
            ['Review-systeem', '-', '-', '-', '✔️', '✔️'],
            ['Early access features', '-', '-', '-', '✔️', '✔️'],
            ['Veilig & privacy', '✔️', '✔️', '✔️', '✔️', '✔️'],
          ]
        }
      };
      // --- Tooltip data per plan ---
      const PLAN_TOOLTIPS = {
        Basis: 'Perfect om gratis te starten en kennis te maken. Bevat basisfuncties en beperkte support.',
        'Pjotters-Currenty': 'Upgrade met coins! Zelfde voordelen als gratis, maar sneller support en extra features.',
        Plus: 'Meer uploads, betere support en extra opties. Ideaal voor wie meer wil.',
        Pro: 'Voor de serieuze gebruiker: snelle support, meer vrijheid, uitgebreidere tools.',
        Premium: 'Maximaal alles: hoogste limieten, premium support, alle features zonder beperkingen.'
      };
      // --- Feature-lijst per plan (voorbeeld, per groep kun je uitbreiden) ---
      const PLAN_FEATURES = {
        artiest: {
          Basis: ['10 tracks/maand','Commercieel: 30 dagen','Royaltyvrij','Standaard support'],
          'Pjotters-Currenty': ['10 tracks/maand','Commercieel: 30 dagen (coins)','Royaltyvrij','Snellere support'],
          Plus: ['50 tracks/maand','Commercieel: 90 dagen','Royaltyvrij','Snellere support'],
          Pro: ['Onbeperkt tracks','Commercieel: 1 jaar','Royaltyvrij','Premium support'],
          Premium: ['Onbeperkt tracks','Commercieel: 2 jaar','Royaltyvrij','Premium support (1u)']
        },
        fotograaf: {
          Basis: ['50 uploads/maand','Watermerk','Portfolio basis','Standaard support'],
          'Pjotters-Currenty': ['50 uploads/maand','Watermerk','Portfolio basis','Snellere support'],
          Plus: ['250 uploads/maand','Geen watermerk','Portfolio uitgebreid','Snellere support'],
          Pro: ['Onbeperkt uploads','Geen watermerk','Portfolio pro','Premium support'],
          Premium: ['Onbeperkt uploads','Geen watermerk','Portfolio premium','Premium support (1u)']
        },
        musicai: {
          Basis: ['10 tracks/maand','Instrumentaal','Commercieel: 30 dagen','Standaard support'],
          'Pjotters-Currenty': ['10 tracks/maand','Instrumentaal','Commercieel: 30 dagen (coins)','Snellere support'],
          Plus: ['50 tracks/maand','Instrumentaal','Commercieel: 90 dagen','Snellere support'],
          Pro: ['Onbeperkt tracks','Instrumentaal & vocals','Commercieel: 1 jaar','Premium support'],
          Premium: ['Onbeperkt tracks','Instrumentaal & vocals','Commercieel: 2 jaar','Premium support (1u)']
        },
        klant: {
          Basis: ['1 chat tegelijk','2 uploads/chat','Standaard kwaliteit','Standaard support'],
          'Pjotters-Currenty': ['1 chat tegelijk','2 uploads/chat','Standaard kwaliteit','Snellere support'],
          Plus: ['10 chats tegelijk','5 uploads/chat','Hoge kwaliteit','Snellere support'],
          Pro: ['Onbeperkt chats','20 uploads/chat','Origineel','Premium support'],
          Premium: ['Onbeperkt chats','50 uploads/chat','Origineel','Premium support (1u)']
        }
      };
      // --- Interactieve UI ---
      const pricingTiers = document.getElementById('pricing-tiers');
      const pricingComparisons = document.getElementById('pricing-comparisons');
      const roleBtns = document.querySelectorAll('.role-btn');
      const icons = {
        'Basis': '🟢',
        'Pjotters-Currenty': '💰',
        'Plus': '✨',
        'Pro': '🚀',
        'Premium': '👑'
      };
      const ctas = {
        'Basis': 'Start gratis en ontdek de basis!',
        'Pjotters-Currenty': 'Upgrade met je verdiende coins! (beter dan gratis)',
        'Plus': 'Meer mogelijkheden voor een klein bedrag.',
        'Pro': 'Voor de serieuze gebruiker met extra power.',
        'Premium': 'Maximale vrijheid, support en features!'
      };
      const prijzen = {
        'Basis': '€0,00',
        'Pjotters-Currenty': '10.000 pjotters',
        'Plus': '€4,99',
        'Pro': '€14,99',
        'Premium': '€29,99'
      };
      // Tooltip & feature rendering
      function renderTiers(role) {
        const group = PRICING_GROUPS[role];
        const uitleg = {
          'artiest': 'Maak, beheer en verkoop je eigen muziek. Voor elke creatieve artiest die meer uit zijn tracks wil halen.',
          'fotograaf': 'De plek voor fotografen om hun portfolio te delen, te verkopen en te laten groeien.',
          'musicai': 'Genereer unieke AI-muziek, van instrumentaal tot met vocals, royaltyvrij en klaar voor gebruik.',
          'klant': 'Word klant en krijg toegang tot chat, downloads, moodboards, en alle voordelen voor jouw creatieve projecten.'
        };
        pricingTiers.innerHTML = `
          <div class='pricing-uitleg animated-section' style='text-align:center;max-width:700px;margin:0 auto 2rem auto;font-size:1.15em;color:#f5d300;'>${uitleg[role]}</div>
          <div class='pricing-tier-grid'>
            ${group.tiers.map(tier => `
              <div class='pricing-card plan-${tier.toLowerCase().replace(/[^a-z]/g,'')}' tabindex="0" onmouseenter="showTooltip(event,'${tier}')" onmouseleave="hideTooltip()" onfocus="showTooltip(event,'${tier}')" onblur="hideTooltip()">
                <h3>${icons[tier]||''} ${tier}</h3>
                <div class='price'>${prijzen[tier]}</div>
                <ul class='plan-features'>${PLAN_FEATURES[role][tier].map(f=>`<li>${f}</li>`).join('')}</ul>
                <div class='cta-text' style='margin:1rem 0 0.5rem 0;color:#a259c6;font-size:1.01em;'>${ctas[tier]}</div>
                <button onclick="planDetails('${role}','${tier}')">Kies ${tier}</button>
              </div>`).join('')}
          </div>
          <div id="plan-tooltip" class="plan-tooltip" style="display:none;"></div>`;
      }
      // Tooltip helpers
      window.showTooltip = function(e, tier) {
        const card = e.currentTarget;
        const tooltip = document.getElementById('plan-tooltip');
        tooltip.textContent = PLAN_TOOLTIPS[tier];
        tooltip.style.display = 'block';
        const rect = card.getBoundingClientRect();
        tooltip.style.left = (rect.left + rect.width/2 - 120) + 'px';
        tooltip.style.top = (rect.top + window.scrollY - 60) + 'px';
      };
      window.hideTooltip = function() {
        document.getElementById('plan-tooltip').style.display = 'none';
      };
      // Plan details popup
      window.planDetails = function(role, tier) {
        const features = PLAN_FEATURES[role][tier].map(f=>`<li>${f}</li>`).join('');
        const html = `<div class='plan-popup-bg' onclick='closePlanPopup()'></div><div class='plan-popup'><h2>${icons[tier]||''} ${tier}</h2><div class='price'>${prijzen[tier]}</div><ul>${features}</ul><button onclick='closePlanPopup()'>Sluiten</button></div>`;
        const popup = document.createElement('div');
        popup.id = 'plan-popup-wrap';
        popup.innerHTML = html;
        document.body.appendChild(popup);
      }
      window.closePlanPopup = function() {
        const popup = document.getElementById('plan-popup-wrap');
        if (popup) popup.remove();
      };
      // Icon cell rendering
      function iconCell(val) {
        if (val==='✔️') return `<span style='color:#1db954;font-size:1.3em;'>✔️</span>`;
        if (val==='-') return `<span style='color:#e74c3c;font-size:1.3em;'>✖️</span>`;
        return val;
      }
      // Comparison rendering
      function renderComparison(role) {
        const group = PRICING_GROUPS[role];
        const head = `<tr><th>Feature</th>${group.tiers.map(t=>`<th>${icons[t]||''} ${t}</th>`).join('')}</tr>`;
        const rows = group.comparison.map(arr => `<tr>${arr.map((cell,i)=>i===0?`<td>${cell}</td>`:`<td>${iconCell(cell)}</td>`).join('')}</tr>`).join('');
        pricingComparisons.innerHTML = `<section class='pricing-compare glass'><h2>Vergelijk ${group.label}-abonnementen</h2><table class='pricing-table'>${head}${rows}</table></section>`;
      }
      roleBtns.forEach(btn => btn.addEventListener('click', e => {
        roleBtns.forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderTiers(btn.dataset.role);
        renderComparison(btn.dataset.role);
      }));
      // Init: start met artiest
      renderTiers('artiest');
      renderComparison('artiest');
    </script>
</body>
</html>
