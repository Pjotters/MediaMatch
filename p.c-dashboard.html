<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pjotters-Currenty Dashboard</title>
  <link rel="stylesheet" href="pjotters-currenty.css">
  <style>
    /* Modern/donker/glas-morfisme, responsive */
    body {
      font-family: Arial, sans-serif;
      background-color: #333;
      color: #fff;
    }
    .pjotters-main {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background-color: #444;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .dashboard-tabs {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .tab-btn {
      background-color: #555;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .tab-btn.active {
      background-color: #666;
    }
    .tab-content {
      display: none;
      padding: 20px;
    }
    .tab-content.active {
      display: block;
    }
    .filter-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .filter-row input, .filter-row select {
      margin-right: 10px;
    }
    .history-table {
      border-collapse: collapse;
      width: 100%;
    }
    .history-table th, .history-table td {
      border: 1px solid #666;
      padding: 10px;
      text-align: left;
    }
    .history-table th {
      background-color: #555;
    }
    .pjotters-leaderboard {
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div id="header-include"></div>
  <main class="pjotters-main">
    <div class="dashboard-tabs">
      <button class="tab-btn active" data-tab="home">Home</button>
      <button class="tab-btn" data-tab="geschiedenis">Geschiedenis</button>
      <button class="tab-btn" data-tab="uitgaven">Uitgaven</button>
      <button class="tab-btn" data-tab="inkomen">Inkomen</button>
    </div>
    <section class="tab-content active" id="tab-home">
      <h2>Jouw Pjotters-Currenty Dashboard</h2>
      <div id="pc-saldo"></div>
      <div id="pc-abos"></div>
      <div id="pc-activiteiten"></div>
      <canvas id="pc-saldo-grafiek" height="120"></canvas>
    </section>
    <section class="tab-content" id="tab-geschiedenis" style="display:none;">
      <h3>Geschiedenis</h3>
      <div class="filter-row">
        <input type="date" id="filter-from"> tot <input type="date" id="filter-to">
        <select id="filter-type"><option value="">Alle types</option><option value="gok">Gok</option><option value="game">Game</option><option value="shop">Shop</option><option value="clicker">Clicker</option></select>
        <input type="text" id="filter-spel" placeholder="Spelnaam">
        <select id="filter-result"><option value="">Alles</option><option value="win">Win</option><option value="loss">Loss</option></select>
        <button id="filter-apply">Filter</button>
      </div>
      <table class="history-table"><thead><tr><th>Datum</th><th>Activiteit</th><th>Coins</th></tr></thead><tbody id="pc-history-tbody"></tbody></table>
    </section>
    <section class="tab-content" id="tab-uitgaven" style="display:none;">
      <h3>Uitgaven</h3>
      <div id="pc-uitgaven-info"></div>
      <table class="history-table"><thead><tr><th>Datum</th><th>Activiteit</th><th>Coins</th></tr></thead><tbody id="pc-uitgaven-tbody"></tbody></table>
    </section>
    <section class="tab-content" id="tab-inkomen" style="display:none;">
      <h3>Inkomen</h3>
      <div id="pc-inkomen-info"></div>
      <table class="history-table"><thead><tr><th>Datum</th><th>Activiteit</th><th>Coins</th></tr></thead><tbody id="pc-inkomen-tbody"></tbody></table>
    </section>
    <section class="pjotters-leaderboard">
      <h3>Leaderboard</h3>
      <div id="leaderboard"></div>
    </section>
  </main>
  <footer class="pjotters-footer">
    <p>&copy; 2025 Pjotters-Currenty & MediaMatch</p>
  </footer>
  <script src="p.c-dashboard.js"></script>
  <script>
    // Tabbed interface
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const tabId = tab.getAttribute('data-tab');
        const tabContent = document.getElementById(`tab-${tabId}`);
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        tabContent.style.display = 'block';
      });
    });
  </script>
  <script>
    fetch('header.html').then(r=>r.text()).then(html=>{
      document.getElementById('header-include').innerHTML = html;
    });
  </script>
</body>
</html>
