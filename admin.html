<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>MediaMatch | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="main-nav">
    <a href="home.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="admin.html" class="active">Admin</a>
  </nav>
  <main>
    <h1>Admin Beheer Fotografen</h1>
    <section>
      <h2>Fotograaf zoeken</h2>
      <input type="text" id="searchUser" placeholder="Gebruikersnaam of ID">
      <button id="findUserBtn">Zoek</button>
      <div id="userResult"></div>
    </section>
    <section id="editSection" style="display:none;">
      <h2>Fotograaf bewerken</h2>
      <form id="editUserForm">
        <label>Naam: <input type="text" id="editNaam"></label><br>
        <label>Email: <input type="email" id="editEmail"></label><br>
        <label>Plan:
          <select id="editPlan">
            <option value="free">Free</option>
            <option value="pro">Pro</option>
            <option value="premium">Premium</option>
          </select>
        </label><br>
        <label>Pjotters-Verified: <input type="checkbox" id="editVerified"></label><br>
        <button type="submit" class="wizard-btn">Opslaan</button>
      </form>
    </section>
  </main>
  <footer>&copy; 2025 MediaMatch. Alle rechten voorbehouden.</footer>
  <script src="config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
