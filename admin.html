<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaMatch - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin pagina specifieke styling */
        .admin-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem 2rem;
            border-radius: var(--radius);
            background: hsl(var(--surface)/0.4);
            backdrop-filter: var(--blur);
            border: 1px solid hsl(var(--primary)/0.2);
        }
        
        .admin-header h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(to right, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .admin-stats {
            display: flex;
            gap: 1.5rem;
        }
        
        .stat-card {
            padding: 0.8rem 1.2rem;
            border-radius: calc(var(--radius) / 2);
            background: hsla(var(--surface)/0.6);
            backdrop-filter: var(--blur);
            border: 1px solid hsl(var(--primary)/0.2);
        }
        
        .stat-card span {
            font-weight: bold;
            color: hsl(var(--primary));
        }
        
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .admin-item {
            padding: 1.5rem;
            border-radius: var(--radius);
            background: hsl(var(--surface)/0.4);
            backdrop-filter: var(--blur);
            border: 1px solid hsl(var(--primary)/0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .admin-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .admin-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: calc(var(--radius) / 2);
            margin-bottom: 1rem;
        }
        
        .admin-item h4 {
            margin: 0.5rem 0;
            font-size: 1.2rem;
        }
        
        .admin-item p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 1rem;
        }
        
        .reject-btn {
            margin-top: auto;
            padding: 0.7rem;
            background: linear-gradient(45deg, hsl(0, 80%, 40%), hsl(350, 80%, 45%));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 500;
        }
        
        .reject-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .approve-btn {
            margin-top: 0.5rem;
            padding: 0.7rem;
            background: linear-gradient(45deg, hsl(130, 80%, 40%), hsl(160, 80%, 40%));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 500;
        }
        
        .approve-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }
        
        .search-bar {
            display: flex;
            margin-bottom: 1.5rem;
        }
        
        .search-bar input {
            flex-grow: 1;
            padding: 0.8rem 1rem;
            border-radius: 50px 0 0 50px;
            background-color: hsla(var(--surface)/0.6);
            border: 1px solid hsla(var(--primary)/0.3);
            border-right: none;
            color: white;
            outline: none;
        }
        
        .search-bar button {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(45deg, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
            color: white;
            border: none;
            border-radius: 0 50px 50px 0;
            cursor: pointer;
        }
        
        .loading-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
            grid-column: 1 / -1;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid hsla(var(--primary), 0.2);
            border-top-color: hsl(var(--primary));
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .admin-btn {
            padding: 0.7rem;
            background: linear-gradient(45deg, hsl(280, 80%, 60%), hsl(340, 80%, 55%));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 500;
        }
        
        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <header class="glass">
        <div class="logo"><img src="assets/MediaMatch.png" alt="MediaMatch Logo" height="40"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="upload.html">Upload</a>
            <a href="admin.html" class="active">Admin</a>
        </nav>
    </header>

    <main class="glass" id="admin-main" style="padding:2rem;max-width:1100px;margin:3rem auto 2rem auto;border-radius:1.5rem;box-shadow:0 4px 40px #0008;background:rgba(34,20,46,0.97);color:#fff;">
        <h2 style="margin-top:0">Admin Dashboard</h2>
        <section id="user-section" style="margin-bottom:2.5rem;">
            <h3>Gebruikersbeheer</h3>
            <div style="margin-bottom:1rem;">
                <button class="admin-btn" onclick="filterUsers('all')">Alle profielen</button>
                <button class="admin-btn" onclick="filterUsers('artiest')">Artiesten</button>
                <button class="admin-btn" onclick="filterUsers('fotograaf')">Fotografen</button>
                <button class="admin-btn" onclick="filterUsers('klant')">Klanten</button>
            </div>
            <div id="user-overview" style="overflow-x:auto;"></div>
        </section>
        <section id="bundel-section" style="margin-bottom:2.5rem;">
            <h3>Bundelbeheer</h3>
            <div id="bundel-overview" style="display:flex;gap:2rem;flex-wrap:wrap;"></div>
            <button id="add-bundel" class="admin-btn" style="margin-top:1rem;background:#f06292;">Nieuwe bundel toevoegen</button>
        </section>
        <section id="bezwaren-section" style="margin-bottom:2.5rem;">
            <h3>Bezwaarschriften</h3>
            <div id="bezwaren-overview" style="overflow-x:auto;"></div>
        </section>
        <section id="chat-section">
            <h3>Live Chat</h3>
            <div id="admin-chatbox" style="background:rgba(34,20,46,0.90);border-radius:1rem;padding:1rem;max-width:600px;min-height:180px;max-height:250px;overflow-y:auto;margin-bottom:1rem;"></div>
            <div style="display:flex;gap:0.5rem;max-width:600px;">
                <input id="admin-chatinput" placeholder="Typ je bericht..." style="flex:1;border-radius:0.7rem;padding:0.6rem 1rem;border:none;background:#31204a;color:#fff;" />
                <button id="admin-sendbtn" class="admin-btn" style="background:#f06292;">Verzend</button>
            </div>
        </section>
    </main>
    
    <footer class="glass">
        <p> 2025 MediaMatch - Alle rechten voorbehouden</p>
    </footer>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
